{% extends "base.html" %}
{% block title %}歷史重播｜Gate Quant Scanner{% endblock %}
{% block content %}<section class="panel"><h1>歷史重播</h1><p>每一個 30 分鐘時間點獨立重建，嚴格禁止使用未來資料。</p><form id="replay-form"><label>開始 <input name="start_time" type="datetime-local" value="2026-06-09T10:00" required></label><label>結束 <input name="end_time" type="datetime-local" value="2026-06-09T12:00" required></label><label>時區 <input name="timezone" value="Asia/Taipei"></label><label>TOP N <input name="top_n" type="number" min="1" max="10" value="10"></label><label>間隔（分鐘） <input name="interval_minutes" type="number" value="30"></label><label class="check"><input name="include_details" type="checkbox" checked>完整指標</label><label class="check"><input name="send_discord" type="checkbox">傳送 Discord</label><button class="button" type="submit">執行重播</button></form><div id="replay-progress" class="progress"></div></section>{% endblock %}{% block scripts %}<script src="/static/js/replay.js"></script>{% endblock %}
